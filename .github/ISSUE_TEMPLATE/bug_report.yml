name: Bug Report
description: Report a defect in Lunch Table Games packages, apps, scaffolds, or agent surfaces.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - games-core
        - games-tabletop
        - games-ai
        - games-api
        - games-assets
        - games-render
        - games-side-scroller
        - lunchtable CLI
        - TCG proof app
        - Convex backend
        - MCP/SSE/A2A agents
        - GitHub/CI/CD
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Describe the observed behavior and expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include commands, scaffold template, package version, or replay details.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification already run
      description: List any tests, builds, or package proofs you ran.
