<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Lunch Table Games</title>
  </head>
  <body>
    <div id="root">
      <main
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 2rem;
          font-family:
            Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
            'Segoe UI', sans-serif;
          color: #28180b;
          background: #f4e5c7;
        "
      >
        <section
          style="
            max-width: 36rem;
            padding: 2rem;
            border-radius: 24px;
            background: rgba(255, 249, 239, 0.9);
            border: 1px solid rgba(69, 41, 15, 0.12);
          "
        >
          <h1 style="margin: 0 0 1rem; font-size: 2rem">
            Lunch Table Games needs the dev server.
          </h1>
          <p style="margin: 0; line-height: 1.6">
            Run <code>bun run dev:web</code> from the repo root and open the
            Vite local URL instead of this source file.
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
